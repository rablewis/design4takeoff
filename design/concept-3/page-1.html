<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Concept 3 — Take-off</title>
<link rel="stylesheet" href="../shared/reset.css">
<link rel="stylesheet" href="layout.css">
<link id="theme-link" rel="stylesheet" href="../concept-1/themes/light.css">
</head>
<body>

<nav class="mockup-nav">
  <span class="mn-logo">Concept 3</span>
  <div class="mn-pages">
    <a href="page-1.html" class="mn-link active">Sign In</a>
    <a href="page-2.html" class="mn-link">Sign Up</a>
    <a href="page-3.html" class="mn-link">Restricted</a>
    <a href="page-4.html" class="mn-link">Workspace</a>
    <a href="page-5.html" class="mn-link">Annotations</a>
    <a href="page-6.html" class="mn-link">Cost Table</a>
    <a href="page-7.html" class="mn-link">Inline Forms</a>
  </div>
  <div class="mn-sep"></div>
  <div class="mn-theme">
    <span class="mn-theme-label">Theme</span>
    <button class="mn-theme-btn active" data-theme="light" onclick="setTheme('light')">Light</button>
    <button class="mn-theme-btn" data-theme="dark" onclick="setTheme('dark')">Dark</button>
    <button class="mn-theme-btn" data-theme="brand" onclick="setTheme('brand')">Brand</button>
  </div>
  <a href="../index.html" class="mn-hub">← Hub</a>
</nav>

<div class="app-shell ghost">

  <!-- Section nav (ghost: dimmed and non-interactive) -->
  <aside class="section-nav">
    <div class="sn-logo-slot">
      <button class="sn-logo-btn">T</button>
    </div>
    <nav class="sn-nav">
      <button class="sn-btn" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      </button>
      <button class="sn-btn" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      </button>
      <button class="sn-btn" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
      </button>
    </nav>
    <div class="sn-bottom">
      <button class="sn-btn" disabled><span class="sn-status-dot grey"></span></button>
      <button class="sn-btn" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
      </button>
    </div>
  </aside>

  <!-- Context panel (ghost: empty, background only) -->
  <aside class="context-panel"></aside>

  <!-- Main content area: sign-in card -->
  <div class="auth-main">
    <div class="auth-card">
      <div class="auth-logo">Take<em>-off</em></div>
      <p class="auth-tagline">Quantity take-offs from construction drawings.</p>
      <h1 class="auth-heading">Sign in</h1>

      <!-- Default state -->
      <div id="form-default">
        <div class="field">
          <label for="email">Email address</label>
          <input id="email" type="email" value="user@example.com" autocomplete="email">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" value="password" autocomplete="current-password">
        </div>
        <button class="btn btn-primary btn-full" onclick="showError()">Sign in</button>
        <a class="auth-forgot" href="#">Forgot password?</a>
      </div>

      <!-- Error state -->
      <div id="form-error" style="display:none">
        <div class="field">
          <label>Email address</label>
          <input type="email" value="wrong@example.com" style="border-color:var(--color-danger)">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" value="wrongpass" style="border-color:var(--color-danger)">
          <span class="error">Incorrect email or password. Please try again.</span>
        </div>
        <button class="btn btn-primary btn-full" onclick="hideError()">Sign in</button>
        <a class="auth-forgot" href="#">Forgot password?</a>
      </div>

      <div class="auth-switch">
        Don't have an account? <a href="page-2.html">Create one</a>
      </div>
    </div>
  </div>

</div><!-- /app-shell -->

<script>
function setTheme(t) {
  document.getElementById('theme-link').href = '../concept-1/themes/' + t + '.css';
  document.querySelectorAll('.mn-theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === t));
  try { localStorage.setItem('c3-theme', t); } catch(e) {}
}
function showError() {
  document.getElementById('form-default').style.display = 'none';
  document.getElementById('form-error').style.display = 'block';
}
function hideError() {
  document.getElementById('form-error').style.display = 'none';
  document.getElementById('form-default').style.display = 'block';
}
try { const s = localStorage.getItem('c3-theme'); if (s) setTheme(s); } catch(e) {}
</script>
</body>
</html>
