  <!-- ── Right panel: sign in form ── -->
  <div class="split-right">
    <div class="split-form">
      <div class="split-logomark">T</div>
      <div class="split-heading">Welcome back</div>

      <!-- Default state -->
      <div id="form-default">
        <div class="field">
          <label for="email">Email address</label>
          <input id="email" type="email" value="user@example.com" autocomplete="email">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" value="password" autocomplete="current-password">
        </div>
        <button class="btn btn-primary btn-full" onclick="showError()">Sign in</button>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <!-- Error state -->
      <div id="form-error" style="display:none">
        <div class="field">
          <label for="email-err">Email address</label>
          <input id="email-err" type="email" value="wrong@example.com" style="border-color:var(--color-danger)">
        </div>
        <div class="field">
          <label for="password-err">Password</label>
          <input id="password-err" type="password" value="wrongpass" style="border-color:var(--color-danger)">
          <span class="error">Incorrect email or password. Please try again.</span>
        </div>
        <button class="btn btn-primary btn-full" onclick="hideError()">Sign in</button>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <div class="auth-divider"></div>
      <div class="auth-switch">Don't have an account? <a href="page-2.html">Create one</a></div>
    </div>
  </div>

</div><!-- /split-auth -->

<script>
function setTheme(t) {
  document.getElementById('theme-link').href = 'themes/' + t + '.css';
  document.querySelectorAll('.mn-theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === t));
  try { localStorage.setItem('c2-theme', t); } catch(e) {}
}
function showError() {
  document.getElementById('form-default').style.display = 'none';
  document.getElementById('form-error').style.display = 'block';
}
function hideError() {
  document.getElementById('form-error').style.display = 'none';
  document.getElementById('form-default').style.display = 'block';
}
try { const s = localStorage.getItem('c2-theme'); if (s) setTheme(s); } catch(e) {}
</script>
</body>
